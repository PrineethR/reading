<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writings</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
</head>

<body>

    <main class="container">
        <section class="hero">
            <h1 class="hero-title">Selected<br>Writings</h1>
            <p class="hero-subtitle">Reflections, stories, and thoughts in lots of forms.</p>
        </section>

        <div class="scribble-divider" id="scribble-divider">
            <svg viewBox="0 0 600 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Flatter, slightly imperfect straight line -->
                <path id="scribble-path" d="M0,10 Q100,8 200,12 T400,9 T600,11" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </div>

        <section class="post-list" id="post-list">
            <!-- Posts injected here dynamically -->
            <div class="loading"></div>
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 opinions :(</p>
        <nav class="footer-sitemap" style="margin-top: var(--spacing-md);">
            <a href="https://prineethr.com" target="_blank" rel="noopener noreferrer"
                class="portfolio-link">Portfolio</a>
        </nav>
    </footer>

    <script type="module" src="js/main.js"></script>
</body>

</html>
